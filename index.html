<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Daily Routine Dashboard</title>

<style>
body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg,#fdf2f8,#ede9fe); margin:0; padding:20px; }
h1 { text-align:center; }

.container { max-width:1100px; margin:auto; }

.grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; }

.task { background:white; padding:12px; margin:8px 0; border-radius:14px; display:flex; align-items:center; gap:12px; }
.task.completed { background:#dcfce7; }

.time { font-weight:bold; min-width:120px; }
.task-name { flex:1; }

input[type="checkbox"] { transform: scale(1.3); accent-color:#22c55e; }

.progress-box { width:100%; background:#f3f4f6; border-radius:12px; margin-bottom:20px; overflow:hidden; }
.progress { height:20px; background:#86efac; width:0%; }

.popup {
position:fixed;
top:50%; left:50%;
transform:translate(-50%,-50%);
background:#fff0f6;
padding:20px 30px;
border-radius:16px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
font-size:18px;
display:none;
z-index:999;
}

.confetti {
position:fixed;
width:10px; height:10px;
animation:burst 1.2s ease-out forwards;
}

@keyframes burst {
0% { transform:translate(0,0) scale(1); opacity:1; }
100% { transform:translate(var(--x), var(--y)) scale(0.8); opacity:0; }
}
</style>
</head>

<body>

<div class="container">
<h1>✨ Daily Routine Dashboard ✨</h1>

<div class="progress-box">
<div class="progress" id="progress"></div>
</div>

<div class="grid">
<div><h2>Day 1</h2><div id="day1"></div></div>
<div><h2>Day 2</h2><div id="day2"></div></div>
</div>
</div>

<div class="popup" id="popup"></div>

<script>

const tasks = {
 day1:[
  ["07:00 - 07:10","Wake up 🌤️"],
  ["07:10 - 07:25","Brush + freshen up 🪥"],
  ["07:25 - 07:45","Morning prayer 🙏"],
  ["07:45 - 08:15","Yoga / stretch 🧘‍♀️"],
  ["08:15 - 09:00","Breakfast + get ready 🍳"],
  ["09:00 - 11:00","Focused work 💻"],
  ["11:00 - 11:15","Break ☕"],
  ["11:15 - 01:00","Deep work 📚"],
  ["01:00 - 01:15","Prayer 🙏"],
  ["01:15 - 02:00","Lunch 🍱"],
  ["02:00 - 03:00","Rest 😌"],
  ["03:00 - 05:00","Work / learning 🚀"],
  ["05:00 - 05:15","Break 🍪"],
  ["05:15 - 06:00","Walk 🚶‍♀️"],
  ["06:00 - 06:15","Prayer 🙏"],
  ["06:15 - 07:30","Hobbies 🎨"],
  ["07:30 - 08:00","Dinner 🍽️"],
  ["08:00 - 09:00","Relax 📺"],
  ["09:00 - 09:15","Prayer 🙏"],
  ["09:15 - 10:00","Reading 📖"],
  ["10:00","Sleep 😴"]
 ],

 day2:[
  ["07:30 - 07:45","Wake up 🌞"],
  ["07:45 - 08:00","Brush 🪥"],
  ["08:00 - 08:20","Prayer 🙏"],
  ["08:20 - 09:00","Breakfast 🍳"],
  ["09:00 - 11:00","Work 💻"],
  ["11:00 - 11:15","Break ☕"],
  ["11:15 - 01:00","Deep work 📚"],
  ["01:00 - 01:15","Prayer 🙏"],
  ["01:15 - 02:00","Lunch 🍱"],
  ["02:00 - 03:00","Rest 😌"],
  ["03:00 - 05:00","Work 🚀"],
  ["05:00 - 05:15","Break 🍪"],
  ["05:15 - 06:00","Workout 🏃‍♀️"],
  ["06:00 - 06:15","Prayer 🙏"],
  ["06:15 - 07:30","Free time 🎧"],
  ["07:30 - 08:00","Dinner 🍽️"],
  ["08:00 - 09:00","Relax 📺"],
  ["09:00 - 09:15","Prayer 🙏"],
  ["09:15 - 10:30","Reading 📖"],
  ["10:30","Sleep 😴"]
 ]
};

let audioCtx = null;

function initAudio(){
 if(!audioCtx){
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
 }
 if(audioCtx.state === 'suspended'){
  audioCtx.resume();
 }
}

function showPopup(msg){
 const p=document.getElementById('popup');
 p.innerText=msg;
 p.style.display='block';
 setTimeout(()=>p.style.display='none',2000);
}

function playAlarm(){
 if(!audioCtx) return;
 const osc = audioCtx.createOscillator();
 const gain = audioCtx.createGain();
 osc.type = 'sine';
 osc.frequency.setValueAtTime(800, audioCtx.currentTime);
 gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
 osc.connect(gain);
 gain.connect(audioCtx.destination);
 osc.start();
 osc.stop(audioCtx.currentTime + 0.3);
}

function playSuccess(){
 if(!audioCtx) return;
 const gain = audioCtx.createGain();
 gain.connect(audioCtx.destination);
 gain.gain.setValueAtTime(0.25, audioCtx.currentTime);

 [800,1000,1200,1500].forEach((f,i)=>{
  const osc = audioCtx.createOscillator();
  osc.type='triangle';
  osc.frequency.setValueAtTime(f,audioCtx.currentTime+i*0.1);
  osc.connect(gain);
  osc.start(audioCtx.currentTime+i*0.1);
  osc.stop(audioCtx.currentTime+i*0.1+0.15);
 });
}

function confetti(){
 for(let i=0;i<40;i++){
  const c=document.createElement('div');
  c.className='confetti';
  c.style.left='50%';
  c.style.top='50%';
  c.style.setProperty('--x',(Math.random()*400-200)+'px');
  c.style.setProperty('--y',(Math.random()*400-200)+'px');
  c.style.background=`hsl(${Math.random()*360},100%,70%)`;
  document.body.appendChild(c);
  setTimeout(()=>c.remove(),1200);
 }
}

function render(day,id){
 const container=document.getElementById(id);
 tasks[day].forEach((t)=>{
  const div=document.createElement('div');
  div.className='task';

  const cb=document.createElement('input');
  cb.type='checkbox';

  const time=document.createElement('span');
  time.className='time';
  time.textContent=t[0];

  const name=document.createElement('span');
  name.className='task-name';
  name.textContent=t[1];

  cb.addEventListener('change',()=>{
    if(cb.checked){
      div.classList.add('completed');
      showPopup('🎉 Task Completed!');
      confetti();
      playSuccess();
    } else {
      div.classList.remove('completed');
    }
    save(); updateProgress();
  });

  div.append(cb,time,name);
  container.appendChild(div);
 });
}

render('day1','day1');
render('day2','day2');

function save(){
 const states=[...document.querySelectorAll('input')].map(cb=>cb.checked);
 localStorage.setItem('progress',JSON.stringify(states));
}

function load(){
 const states=JSON.parse(localStorage.getItem('progress')||'[]');
 document.querySelectorAll('input').forEach((cb,i)=>{
  if(states[i]){
    cb.checked=true;
    cb.parentElement.classList.add('completed');
  }
 });
 updateProgress();
}

function updateProgress(){
 const total=document.querySelectorAll('input').length;
 const done=[...document.querySelectorAll('input')].filter(cb=>cb.checked).length;
 document.getElementById('progress').style.width=(done/total*100)+'%';
}

load();

</script>

</body>
</html>
